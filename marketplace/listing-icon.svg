<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background: dark rounded square, same tone as the in-app metric cards -->
  <rect width="512" height="512" rx="112" fill="#1C1C1C"/>

  <!-- Subtle inner highlight ring (gives the dark face a tiny bit of depth) -->
  <rect x="2" y="2" width="508" height="508" rx="110"
        stroke="#FFFFFF" stroke-width="1" opacity="0.04" fill="none"/>

  <!-- Ring-gauge track -->
  <circle cx="256" cy="256" r="160" stroke="#2D2D2D" stroke-width="52" fill="none"/>

  <!-- Progress arc, ~65% clockwise from top.
       Circumference 2π·160 ≈ 1005 → dash 653/352 -->
  <circle cx="256" cy="256" r="160" stroke="#4ADE80" stroke-width="52" fill="none"
          stroke-linecap="round"
          stroke-dasharray="653 352"
          transform="rotate(-90 256 256)"/>
</svg>
